sonar.projectKey=CHAOTICA
# Report the Quality Gate result but do not fail the scan on a red gate yet:
# the gate is currently red (0% coverage on a large legacy codebase) and
# enforcing it now would block every push. Flip to `true` (or enable the
# SonarQube Quality Gate step in sast.yml) once the gate is green on main.
sonar.qualitygate.wait=false

# --- Analysis scope -------------------------------------------------------
# Analyse the Django application only. Everything else in the repo tree
# (built docs, collected static, uploaded media) is generated or vendored.
sonar.sources=app
sonar.tests=app
sonar.sourceEncoding=UTF-8
sonar.python.version=3.12

# Which files under sonar.tests are the test suite (kept out of the main
# "source" metrics and used for test/coverage reporting).
sonar.test.inclusions=**/tests.py,**/tests/**/*.py,**/test_*.py

# --- Exclusions: generated & vendored code --------------------------------
# These files are not authored/maintained by the team, so linting them just
# produces noise (they drove ~300 of the ~319 "bugs" and the 43.7% dup rate).
sonar.exclusions=\
    **/migrations/**,\
    site/**,\
    docs/**,\
    app/staticfiles/**,\
    app/media/**,\
    app/mediafiles/**,\
    app/static/vendors/**,\
    app/static/assets/css/**,\
    app/static/assets/data/**,\
    app/static/api/**,\
    app/static/assets/js/phoenix.js,\
    app/static/assets/js/moment.js,\
    app/static/assets/js/jquery.dirty.js,\
    app/static/assets/js/snow.js,\
    **/*.min.js,\
    **/*.min.css,\
    **/*.map

# Django templates share large amounts of boilerplate (blocks, includes) by
# design; excluding them from duplication detection avoids false positives.
sonar.cpd.exclusions=\
    **/templates/**,\
    app/static/assets/js/games/**

# --- Coverage -------------------------------------------------------------
# coverage.xml is produced by the CI test step (see .github/workflows).
sonar.python.coverage.reportPaths=app/coverage.xml
sonar.coverage.exclusions=\
    **/migrations/**,\
    **/tests.py,\
    **/tests/**,\
    **/test_*.py,\
    app/manage.py,\
    app/chaotica/settings.py,\
    app/chaotica/wsgi.py,\
    app/chaotica/asgi.py,\
    app/**/apps.py,\
    app/**/admin.py
