upstream chaotica {
    server web:8000;
}

server {
    listen 80;

    location / {
        proxy_pass http://chaotica;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        # Do NOT set X-Forwarded-Proto to $scheme here: TLS is terminated by the
        # upstream proxy and traffic reaches this nginx over plain http, so
        # $scheme is "http". Overwriting it makes Django think the request is
        # http, which breaks CSRF (browser Origin is https) with a 403 on login.
        # Let the upstream terminator's X-Forwarded-Proto: https pass through.
        proxy_redirect off;
    }

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/mediafiles/;
    }
}
