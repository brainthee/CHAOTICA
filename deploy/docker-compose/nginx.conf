upstream chaotica {
    server web:8000;
}

server {

    listen 80;

    location / {
        proxy_pass http://chaotica;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # WebSocket endpoint for the live scheduler (Channels/ASGI). The Upgrade /
    # Connection headers let nginx pass the HTTP->WebSocket upgrade through.
    location /ws/ {
        proxy_pass http://chaotica;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_redirect off;
    }

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/mediafiles/;
    }
}