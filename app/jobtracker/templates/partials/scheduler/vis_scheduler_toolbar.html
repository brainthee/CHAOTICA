{% comment %}Shared vis-timeline toolbar (global + job + phase surfaces).{% endcomment %}
<div class="d-flex align-items-center flex-wrap sched-toolbar px-3 py-2 border-bottom border-translucent">
  <span id="sched-loading" class="sched-loading me-2" aria-live="polite" hidden>
    <span class="spinner-border spinner-border-sm text-primary" role="status"></span>
  </span>
  <div class="btn-group btn-group-sm" role="group" aria-label="Mouse mode">
    <button class="btn btn-phoenix-secondary active" id="btnModePan" title="Drag to pan the timeline"><span class="fas fa-hand me-1"></span>Pan</button>
    <button class="btn btn-phoenix-secondary" id="btnModeSelect" title="Drag across a row to select a date range"><span class="fas fa-object-group me-1"></span>Select</button>
  </div>
  <div class="btn-group btn-group-sm" role="group" aria-label="Zoom">
    <button class="btn btn-phoenix-secondary" id="btnZoomOut" title="Zoom out (or Ctrl/⌘ + scroll)"><span class="fas fa-magnifying-glass-minus"></span></button>
    <button class="btn btn-phoenix-secondary" id="btnZoomIn" title="Zoom in (or Ctrl/⌘ + scroll)"><span class="fas fa-magnifying-glass-plus"></span></button>
  </div>
  <div class="btn-group btn-group-sm" role="group">
    <button class="btn btn-phoenix-secondary" id="btnToday">Today</button>
    <button class="btn btn-phoenix-secondary" id="btnFit">Fit</button>
  </div>
  <div class="btn-group btn-group-sm" role="group" aria-label="Quick zoom">
    <button class="btn btn-phoenix-secondary" data-zoom-weeks="2">2w</button>
    <button class="btn btn-phoenix-secondary" data-zoom-weeks="8">2m</button>
    <button class="btn btn-phoenix-secondary" data-zoom-weeks="26">6m</button>
    <button class="btn btn-phoenix-secondary" data-zoom-weeks="52">1y</button>
  </div>
  <div class="sched-legend ms-auto small text-body-secondary d-none d-lg-block">
    <span class="me-2"><span class="dot" style="background:{{ config.SCHEDULE_COLOR_PHASE_CONFIRMED }}"></span>Confirmed</span>
    <span class="me-2"><span class="dot" style="background:{{ config.SCHEDULE_COLOR_PHASE }}"></span>Tentative</span>
    <span class="me-2"><span class="dot" style="background:{{ config.SCHEDULE_COLOR_PROJECT }}"></span>Project</span>
    <span class="me-2"><span class="dot" style="background:{{ config.SCHEDULE_COLOR_INTERNAL }}"></span>Internal</span>
    <span class="me-2"><span class="dot weekend"></span>Weekend</span>
    <span class="me-2"><span class="dot holiday"></span>Holiday</span>
  </div>
  <span class="ms-2 small text-body-secondary"><span class="fas fa-circle-info me-1"></span>Scroll = up/down &nbsp;·&nbsp; Ctrl/⌘ + scroll (or pinch) = zoom &nbsp;·&nbsp; Right-click a row to book &nbsp;·&nbsp; Double-click to edit</span>
</div>
