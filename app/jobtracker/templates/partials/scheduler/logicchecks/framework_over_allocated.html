<div class="alert alert-danger mb-3" role="alert">
    <p class="mb-2">
        <strong>Over-allocated:</strong> Framework <strong>{{ framework.name }}</strong> does not allow over-allocation.
    </p>
    <table class="table table-sm table-borderless mb-0 fs-9">
        <tbody>
            <tr>
                <td class="text-body-secondary py-0">Budget</td>
                <td class="py-0">{{ framework.total_days }}d</td>
            </tr>
            <tr>
                <td class="text-body-secondary py-0">Already allocated</td>
                <td class="py-0">{{ days_allocated }}d</td>
            </tr>
            <tr>
                <td class="text-body-secondary py-0">This slot</td>
                <td class="py-0">{{ slot_days }}d</td>
            </tr>
            <tr class="border-top border-translucent">
                <td class="text-body-secondary py-0"><strong>Would total</strong></td>
                <td class="py-0"><strong>{{ new_total }}d</strong></td>
            </tr>
        </tbody>
    </table>
</div>
