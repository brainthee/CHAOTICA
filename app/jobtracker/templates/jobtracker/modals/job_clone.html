{% load widget_tweaks %}
<div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
        <form method="post" action="{{ request.get_full_path }}" class="js-submit-modal-form">
            {% csrf_token %}
            <div class="modal-header">
                <h6 class="modal-title font-weight-normal" id="modal-title-default">
                    Clone Job: {{ job }}
                </h6>
                <button type="button" class="btn-close text-body-emphasis" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p class="text-body-secondary small mb-3">
                    Creates a new <strong>Draft</strong> job on <em>{{ job.client }}</em>.
                    Unit, client, and account manager are always copied.
                    Schedule and links are never copied.
                    Select what else to include:
                </p>
                <div class="list-group list-group-flush">
                    <label class="list-group-item">
                        <input class="form-check-input me-2" type="checkbox" name="clone_core" checked>
                        <strong>Core details</strong>
                        <small class="d-block text-body-secondary">Title, overview, deputy AM, primary contact</small>
                    </label>
                    <label class="list-group-item">
                        <input class="form-check-input me-2" type="checkbox" name="clone_financials" checked>
                        <strong>Financials</strong>
                        <small class="d-block text-body-secondary">Framework agreement, charge codes, revenue</small>
                    </label>
                    <label class="list-group-item">
                        <input class="form-check-input me-2" type="checkbox" name="clone_services" checked>
                        <strong>Services &amp; contacts</strong>
                        <small class="d-block text-body-secondary">Indicative services, additional contacts</small>
                    </label>
                    <label class="list-group-item">
                        <input class="form-check-input me-2" type="checkbox" name="clone_risk" checked>
                        <strong>Risk &amp; scope flags</strong>
                        <small class="d-block text-body-secondary">Additional kit, restrictions, high risk, bespoke, time-limited, etc.</small>
                    </label>
                    <label class="list-group-item">
                        <input class="form-check-input me-2" type="checkbox" name="clone_phases">
                        <strong>Clone all phases (as Draft)</strong>
                        <small class="d-block text-body-secondary">Copies all {{ job.phases.count }} phase(s) as Draft with no schedule or QA assignments</small>
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn btn-primary mb-0">Clone Job</button>
                <button type="button" class="btn btn-light shadow-none mb-0" data-bs-dismiss="modal">Cancel</button>
            </div>
        </form>
    </div>
</div>
