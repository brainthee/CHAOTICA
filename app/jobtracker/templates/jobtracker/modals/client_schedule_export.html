{% load static %}
<div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
        {# Plain POST (not js-submit-modal-form) so the submit streams the XLSX download and leaves the modal open. #}
        <form method="post" action="{% url 'client_schedule_export' client.slug %}">
            {% csrf_token %}
            <div class="modal-header">
                <h6 class="modal-title font-weight-normal" id="modal-title-default">
                    Export Schedule — {{ client.name }}
                </h6>
                <button type="button" class="btn-close text-body-emphasis" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label for="start_date" class="form-label fw-semibold">Start Date</label>
                    <input type="date" class="form-control" id="start_date" name="start_date" value="{{ default_start }}" required>
                </div>
                <div class="mb-3">
                    <label for="end_date" class="form-label fw-semibold">End Date</label>
                    <input type="date" class="form-control" id="end_date" name="end_date" value="{{ default_end }}" required>
                </div>
                {% if frameworks %}
                <div class="mb-3">
                    <label for="framework" class="form-label fw-semibold">Framework Agreement <span class="text-body-tertiary">(optional)</span></label>
                    <select class="form-select" id="framework" name="framework">
                        <option value="">— All frameworks —</option>
                        {% for fw in frameworks %}
                            <option value="{{ fw.pk }}">{{ fw }}</option>
                        {% endfor %}
                    </select>
                </div>
                {% endif %}
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn btn-phoenix-primary mb-0">
                    <span class="fas fa-file-excel me-1"></span> Download XLSX
                </button>
                <button type="button" class="btn btn-light shadow-none mb-0" data-bs-dismiss="modal">Cancel</button>
            </div>
        </form>
    </div>
</div>
